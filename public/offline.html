<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A2540" />
    <title>Sem conexão · MedAPS Pro</title>
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(180deg, #0A2540 0%, #1E3A5F 100%);
        color: #F8FAFC;
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 380px; width: 100%;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 32px 24px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      }
      .logo {
        width: 64px; height: 64px; margin: 0 auto 16px;
        border-radius: 14px;
        background: #1E40AF;
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 32px; letter-spacing: -0.02em;
        box-shadow: 0 0 0 1px rgba(59,130,246,0.3);
      }
      h1 { margin: 0 0 8px; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
      p  { margin: 0 0 20px; font-size: 14px; line-height: 1.5; color: #CBD5E1; }
      button {
        appearance: none; border: 0; cursor: pointer;
        font: inherit; font-weight: 600; font-size: 14px;
        background: #2563EB; color: white;
        padding: 10px 20px; border-radius: 10px;
        transition: background 120ms ease;
      }
      button:hover  { background: #1D4ED8; }
      button:active { background: #1E40AF; }
      .hint { margin-top: 18px; font-size: 12px; color: #94A3B8; }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <div class="logo" aria-hidden="true">M</div>
      <h1>Você está offline</h1>
      <p>Sem conexão — dados em cache disponíveis. Reconecte para sincronizar e ver as informações mais recentes.</p>
      <button type="button" onclick="location.reload()">Tentar novamente</button>
      <p class="hint">MedAPS Pro · APS Empresarial</p>
    </main>
  </body>
</html>
